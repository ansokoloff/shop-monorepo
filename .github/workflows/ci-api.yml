name: CI - API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/api/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node.js modules
        id: cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-node-${{ hashFiles('services/api/package-lock.json') }}
          path: services/api/node_modules

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: services/api

      - name: Run lint
        run: npm run lint
        working-directory: services/api
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 19, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache Node.js modules
        id: cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-node-${{ hashFiles('services/api/package-lock.json') }}
          path: services/api/node_modules
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: services/api

      - name: Run tests
        run: npm test
        working-directory: services/api
