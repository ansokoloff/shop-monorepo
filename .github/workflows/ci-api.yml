name: CI - API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/api/**'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  CI:
    uses: ./.github/workflows/_reusable-node-ci.yml
    with:
      working-directory: 'services/api'
