name: CI - Lint-Test

on:
    workflow_call:
        inputs:
            working-directory:
                required: true
                type: string

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node-cached
              with:
                  node-version: '20'
                  working-directory: ${{ inputs.working-directory }}

            - name: Run lint
              run: npm run lint
              working-directory: ${{ inputs.working-directory }}
    test:
        runs-on: ubuntu-latest
        needs: lint
        strategy:
            matrix:
                node-version: [18, 19, 20]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node-cached
              with:
                  node-version: '${{ matrix.node-version }}'
                  working-directory: ${{ inputs.working-directory }}

            - name: Run tests
              run: npm test
              working-directory: ${{ inputs.working-directory }}
