name: DEPLOY - API

on:
    push:
        branches: [main]
        paths:
            - 'services/api/**'
    workflow_dispatch:
        inputs:
            environment:
                description: 'Deployment environment'
                required: true
                default: 'dev'
                type: choice
                options:
                    - dev
                    - staging
                    - prod
            force_deploy:
                description: 'Force deployment even if no changes detected'
                required: true
                default: false
                type: boolean

permissions:
    id-token: write
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node-cached
              with:
                  node-version: '20'
                  working-directory: 'services/api'

            - name: Build API
              run: npm run build
              working-directory: 'services/api'

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: api-build
                  path: services/api/dist
                  overwrite: true
                  compression-level: 1

    deploy-dev:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: dev
        if: inputs.environment == 'dev' || github.event_name == 'push'
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build
    deploy-staging:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: staging
        if: inputs.environment == 'staging'
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build

    deploy-prod:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: prod
        if: inputs.environment == 'prod'
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build
