name: DEPLOY - API

on:
    push:
        branches: [main]
        paths:
            - 'services/api/**'
    workflow_dispatch:
        inputs:
            environment:
                description: 'Deployment environment'
                required: true
                default: 'dev'
                type: choice
                options:
                    - dev
                    - staging
                    - prod
            force_deploy:
                description: 'Force deployment even if no changes detected'
                required: true
                default: false
                type: boolean

permissions:
    id-token: write
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node-cached
              with:
                  node-version: '20'
                  working-directory: 'services/api'

            - name: Build API
              run: npm run build
              working-directory: 'services/api'

            - name: Set tag
              id: set_tag
              run: echo "image_tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push Docker image to GitHub Container Registry
              uses: docker/build-push-action@v7
              with:
                  context: services/api
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/my-api:sha-${{ github.sha }}
        outputs:
            image_tag: ${{ steps.set_tag.outputs.image_tag }}

    deploy-dev:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: dev
        if: inputs.environment == 'dev' || github.event_name == 'push'
        steps:
            - name: Display image tag
              run: echo "We are deploying the image with tag ${{needs.build.outputs.image_tag}} to the dev environment."

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    deploy-staging:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: staging
        if: inputs.environment == 'staging'
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    deploy-prod:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: prod
        if: inputs.environment == 'prod'
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
