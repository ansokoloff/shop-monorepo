name: DEPLOY - API

on:
    push:
        branches: [main]
        paths:
            - 'services/api/**'

permissions:
    id-token: write
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node-cached
              with:
                  node-version: '20'
                  working-directory: 'services/api'

            - name: Build API
              run: npm run build
              working-directory: 'services/api'

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: api-build
                  path: services/api/dist
                  overwrite: true
                  compression-level: 1

    deploy-dev:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: dev
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build
    deploy-staging:
        runs-on: ubuntu-latest
        needs: deploy-dev
        environment:
            name: staging
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build

    deploy-prod:
        runs-on: ubuntu-latest
        needs: deploy-staging
        environment:
            name: prod
        steps:
            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: api-build
